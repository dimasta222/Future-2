name: Update Yandex Reviews

on:
  schedule:
    # Каждый день в 6:00 UTC (9:00 МСК)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Yandex reviews
        env:
          YANDEX_MAPS_API_KEY: ${{ secrets.YANDEX_MAPS_API_KEY }}
        run: node scripts/fetch-yandex-reviews.mjs

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet public/data/yandex-reviews.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/yandex-reviews.json
          git commit -m "chore: обновить данные отзывов Яндекс Карт"
          git push
